<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ramesh Saini v7.1 MVP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #21262d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --danger: #f85149;
      --success: #3fb950;
      --warning: #d29922;
      --border: #30363d;
      --user-bubble: #1f6feb;
      --assistant-bubble: #21262d;
    }
    html { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-secondary); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

    /* Header */
    #header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
    }
    #header h1 {
      font-size: 16px; font-weight: 600;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #header .status-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      margin-right: 6px;
    }
    #header .status-dot.connected { background: var(--success); }
    #header .status-dot.disconnected { background: var(--danger); }
    #header .status-text { font-size: 12px; color: var(--text-secondary); }

    /* Chat Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 14px;
      position: relative;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .message.user {
      align-self: flex-end;
      background: var(--user-bubble);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message.assistant {
      align-self: flex-start;
      background: var(--assistant-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .message .role-label {
      font-size: 11px; font-weight: 600;
      margin-bottom: 4px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .message.assistant .role-label { color: var(--accent); }
    .message .content { white-space: pre-wrap; word-break: break-word; }
    .message .content code {
      background: var(--bg-primary);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
    }
    .message .content pre {
      background: var(--bg-primary);
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 8px 0;
      border: 1px solid var(--border);
    }
    .message .content pre code {
      background: none; padding: 0;
    }
    .message .security-badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 12px;
      margin-top: 8px;
      font-weight: 500;
    }
    .security-badge.allow { background: rgba(63,185,80,0.15); color: var(--success); border: 1px solid rgba(63,185,80,0.3); }
    .security-badge.block { background: rgba(248,81,73,0.15); color: var(--danger); border: 1px solid rgba(248,81,73,0.3); }
    .security-badge.warn { background: rgba(210,153,34,0.15); color: var(--warning); border: 1px solid rgba(210,153,34,0.3); }

    /* Typing indicator */
    #typing {
      display: none;
      align-self: flex-start;
      padding: 12px 20px;
      background: var(--assistant-bubble);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    #typing .dots { display: flex; gap: 4px; }
    #typing .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-secondary);
      animation: bounce 1.4s infinite ease-in-out both;
    }
    #typing .dot:nth-child(1) { animation-delay: -0.32s; }
    #typing .dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }

    /* Input */
    #input-area {
      display: flex; gap: 8px;
      padding: 16px 20px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
    }
    #message-input {
      flex: 1;
      padding: 10px 16px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    #message-input:focus { border-color: var(--accent); }
    #message-input::placeholder { color: var(--text-secondary); }
    #send-btn {
      padding: 10px 20px;
      background: var(--accent);
      color: #fff;
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #send-btn:hover { background: var(--accent-hover); }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Welcome */
    #welcome {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; text-align: center;
      color: var(--text-secondary);
    }
    #welcome h2 { margin-bottom: 8px; color: var(--text-primary); }
    #welcome p { max-width: 400px; line-height: 1.6; }

    /* Code output */
    .code-output {
      margin-top: 8px;
      padding: 8px 12px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: monospace;
      font-size: 13px;
      color: var(--success);
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>⚡ Ramesh Saini v7.1 MVP</h1>
    <div>
      <span class="status-dot disconnected" id="status-dot"></span>
      <span class="status-text" id="status-text">Connecting...</span>
    </div>
  </div>

  <div id="messages">
    <div id="welcome">
      <h2>🚀 Ironclad MVP Ready</h2>
      <p>Ask me anything. I'll process it through the Memory → Agent → Security → Execution pipeline.</p>
      <p style="margin-top:8px;font-size:12px;">Code generation will be inspected by PreCrime Security Analyzer before execution.</p>
    </div>
    <div id="typing">
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>

  <div id="input-area">
    <input type="text" id="message-input" placeholder="Type your message..."
           autofocus />
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>

  <script>
    // ============================================================
    // State
    // ============================================================
    let sessionId = localStorage.getItem('ramesh_session_id') || 'session-' + Math.random().toString(36).substr(2, 8);
    localStorage.setItem('ramesh_session_id', sessionId);
    let isSending = false;

    // ============================================================
    // DOM helpers
    // ============================================================
    const messagesEl = document.getElementById('messages');
    const welcomeEl = document.getElementById('welcome');
    const typingEl = document.getElementById('typing');
    const inputEl = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addMessage(role, content, extras = {}) {
      welcomeEl.style.display = 'none';
      hideTyping();

      const div = document.createElement('div');
      div.className = `message ${role}`;

      let html = `<div class="role-label">${role === 'user' ? 'You' : 'Ramesh AI'}</div>`;
      html += `<div class="content">${formatContent(content)}</div>`;

      if (extras.securityAction && extras.securityAction !== 'none') {
        const badgeClass = extras.securityAction;
        html += `<div class="security-badge ${badgeClass}">🔒 ${extras.securityAction.toUpperCase()}</div>`;
      }
      if (extras.codeOutput) {
        html += `<div class="code-output">▶ ${escapeHtml(extras.codeOutput.substring(0, 200))}</div>`;
      }

      div.innerHTML = html;
      messagesEl.insertBefore(div, typingEl);
      scrollToBottom();
    }

    function formatContent(text) {
      return escapeHtml(text)
        .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code class="language-$1">$2</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br/>');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showTyping() { typingEl.style.display = 'flex'; scrollToBottom(); }
    function hideTyping() { typingEl.style.display = 'none'; }

    function setStatus(connected) {
      statusDot.className = 'status-dot ' + (connected ? 'connected' : 'disconnected');
      statusText.textContent = connected ? 'Connected' : 'Disconnected';
    }

    // ============================================================
    // Backend Communication
    // ============================================================

    function getBackendUrl() {
      // Try Electron API first, fallback to localhost
      if (window.rameshAPI) {
        return window.rameshAPI.getBackendUrl().catch(() => 'http://127.0.0.1:8567');
      }
      return Promise.resolve('http://127.0.0.1:8567');
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || isSending) return;

      inputEl.value = '';
      isSending = true;
      sendBtn.disabled = true;

      addMessage('user', text);
      showTyping();

      try {
        const backendUrl = await getBackendUrl();
        const response = await fetch(`${backendUrl}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, session_id: sessionId })
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json();
        
        addMessage('assistant', data.reply || data.error || '(empty response)', {
          securityAction: data.security_action,
          codeOutput: data.code_output
        });

        if (data.security_checked) {
          setStatus(true);
        }

        sessionId = data.session_id || sessionId;
        localStorage.setItem('ramesh_session_id', sessionId);

      } catch (err) {
        addMessage('assistant', `⚠️ **Connection Error**: ${err.message}\n\nMake sure the backend is running on port 8567.`);
        setStatus(false);
      } finally {
        isSending = false;
        sendBtn.disabled = false;
        hideTyping();
        inputEl.focus();
      }
    }

    // ============================================================
    // Health Check
    // ============================================================

    async function checkHealth() {
      try {
        const backendUrl = await getBackendUrl();
        const resp = await fetch(`${backendUrl}/health`);
        if (resp.ok) {
          setStatus(true);
          const data = await resp.json();
          if (data.security_stats) {
            console.log(`[Health] Security: ${data.security_stats.passes} passed, ${data.security_stats.blocks} blocked`);
          }
        } else {
          setStatus(false);
        }
      } catch {
        setStatus(false);
      }
      setTimeout(checkHealth, 10000);
    }

    // ============================================================
    // Event Listeners
    // ============================================================

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // ============================================================
    // Init
    // ============================================================

    checkHealth();
    console.log(`Ramesh Saini v7.1 MVP — Session: ${sessionId}`);

    // Auto-connect check
    setTimeout(async () => {
      try {
        const backendUrl = await getBackendUrl();
        const resp = await fetch(`${backendUrl}/health`);
        if (resp.ok) {
          setStatus(true);
          addMessage('assistant', '✅ Backend connected. Memory, Agent, and Security Guard are all online.\n\nTry asking me something!');
        }
      } catch {
        // Will retry via checkHealth
      }
    }, 2000);
  </script>
</body>
</html>
